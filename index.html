<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #FAFCF7;
    color: #1C2418;
    min-height: 100vh;
    padding: 20px 14px 60px;
  }
  #root-loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    gap: 12px;
    color: #4C7A2E;
    font-size: 14px;
  }
  .spin {
    width: 26px; height: 26px;
    border: 3px solid #DCEFD0;
    border-top-color: #5BBA2E;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .pg-shell {
    max-width: 1000px;
    margin: 0 auto;
    background: #FFFFFF;
    border-radius: 16px;
    box-shadow: 0 1px 3px rgba(20,40,10,0.06), 0 8px 24px rgba(20,40,10,0.05);
    padding: 0 0 30px;
    overflow: hidden;
  }

  .pg-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    background: #FFFFFF;
    border-bottom: 3px solid #5BBA2E;
    padding: 14px 20px;
  }
  .pg-logo-cartouche {
    background: #0A0A0A;
    border-radius: 0;
    padding: 6px 12px;
    display: flex;
    align-items: center;
  }
  .pg-logo { height: 40px; width: auto; display: block; object-fit: contain; }

  .pg-header-actions { display: flex; align-items: center; gap: 14px; }
  .pg-save-indicator { font-size: 12px; color: #8A9A7E; min-width: 100px; text-align: right; }
  .pg-save-indicator.saved { color: #2E7D32; }
  .pg-save-indicator.error { color: #A33; }

  .pg-btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #5BBA2E;
    color: #fff;
    border: none;
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.1s ease;
  }
  .pg-btn-primary:hover { background: #4FA526; }
  .pg-btn-primary:active { transform: scale(0.97); }

  .pg-tabs {
    display: flex;
    gap: 4px;
    padding: 14px 20px 0;
    border-bottom: 1px solid #E7EFE0;
    flex-wrap: wrap;
  }
  .pg-tab {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    padding: 9px 14px;
    font-size: 13px;
    font-weight: 600;
    color: #7C8C70;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    white-space: nowrap;
  }
  .pg-tab:hover { color: #4C7A2E; }
  .pg-tab.active { color: #2E5C16; border-bottom-color: #5BBA2E; }

  .pg-title {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 24px;
    font-weight: 400;
    color: #1C2418;
    margin: 18px 20px 16px;
  }

  .pg-panel { padding: 0 20px; }

  .pg-empty-state {
    text-align: center;
    padding: 36px 18px;
    color: #8A9A7E;
    font-size: 13.5px;
    background: #F8FBF5;
    border: 1px dashed #D7E8C8;
    border-radius: 12px;
  }

  .pg-biens-list {
    background: #fff;
    border: 1px solid #E7EFE0;
    border-radius: 12px;
    overflow: hidden;
  }
  .pg-biens-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 14px 16px;
    border-bottom: 1px solid #F0F4EC;
    cursor: pointer;
    transition: background 0.1s;
  }
  .pg-biens-row:last-child { border-bottom: none; }
  .pg-biens-row:hover { background: #F8FBF5; }
  .pg-biens-row-name { font-size: 14px; font-weight: 700; color: #1C2418; flex: 1; min-width: 0; }
  .pg-biens-row-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .pg-biens-row-price { font-size: 13.5px; font-weight: 700; color: #2E5C16; white-space: nowrap; }
  .pg-chevron { color: #9DB28F; flex-shrink: 0; }

  .pg-badge {
    display: inline-flex;
    align-items: center;
    font-size: 10.5px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 999px;
    white-space: nowrap;
  }

  .pg-iconbtn {
    background: none;
    border: none;
    color: #8A9A7E;
    cursor: pointer;
    display: flex;
    align-items: center;
    padding: 5px;
    border-radius: 7px;
  }
  .pg-iconbtn:hover { background: #EEF5E8; color: #4C7A2E; }
  .pg-iconbtn.danger:hover { background: #FBE9E9; color: #A33; }

  .pg-detail-screen { padding: 18px 0 10px; }
  .pg-back-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: none;
    border: none;
    color: #4C7A2E;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    padding: 0;
    margin-bottom: 14px;
  }
  .pg-back-btn:hover { text-decoration: underline; }

  .pg-detail-title-input {
    width: 100%;
    border: none;
    background: transparent;
    font-family: Georgia, serif;
    font-size: 22px;
    font-weight: 600;
    color: #1C2418;
    padding: 4px 0;
    box-sizing: border-box;
  }
  .pg-detail-title-input:focus { outline: none; border-bottom: 1px solid #5BBA2E; }
  .pg-detail-created-hint { font-size: 11px; color: #A9B89C; margin-bottom: 14px; }

  .pg-detail-meta-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px 16px;
    margin-bottom: 16px;
  }

  .pg-field { display: flex; flex-direction: column; gap: 5px; }
  .pg-field-label { font-size: 11px; font-weight: 600; color: #6B8A57; text-transform: uppercase; letter-spacing: 0.04em; }
  .pg-field-hint { font-size: 10.5px; color: #A9B89C; font-style: italic; display: block; margin-top: 2px; }

  .pg-input {
    border: 1px solid #DCE8D0;
    border-radius: 8px;
    padding: 9px 11px;
    font-size: 13.5px;
    color: #1C2418;
    background: #fff;
    width: 100%;
    box-sizing: border-box;
    font-family: inherit;
  }
  .pg-input:focus { outline: none; border-color: #5BBA2E; box-shadow: 0 0 0 2px #DCEFD0; }
  .pg-input-sm { padding: 6px 8px; font-size: 12.5px; }
  .pg-readonly-value { font-size: 14px; font-weight: 700; color: #4C7A2E; padding: 9px 0; }
  .pg-textarea {
    border: 1px solid #DCE8D0;
    border-radius: 8px;
    padding: 9px 11px;
    font-size: 13.5px;
    font-family: inherit;
    resize: vertical;
    width: 100%;
    box-sizing: border-box;
  }

  .pg-detail-section-title {
    font-size: 13px;
    font-weight: 700;
    color: #2E5C16;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin: 22px 0 12px;
    padding-top: 16px;
    border-top: 1px solid #E7EFE0;
  }

  .pg-empty-hint {
    font-size: 13px;
    color: #8A9A7E;
    padding: 14px;
    background: #FAFCF7;
    border-radius: 8px;
    text-align: center;
    margin-top: 10px;
  }

  .pg-contact-picker { position: relative; }
  .pg-picker-trigger {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    width: 100%;
    border: 1px solid #DCE8D0;
    border-radius: 8px;
    padding: 9px 11px;
    font-size: 13.5px;
    background: #fff;
    cursor: pointer;
    color: #4C6A3A;
  }
  .pg-picker-dropdown {
    position: relative;
    margin-top: 6px;
    background: #fff;
    border: 1px solid #DCE8D0;
    border-radius: 10px;
    box-shadow: 0 6px 20px rgba(20,40,10,0.1);
    max-height: 220px;
    overflow-y: auto;
    z-index: 20;
    padding: 6px;
  }
  .pg-picker-empty { padding: 10px; font-size: 12px; color: #8A9A7E; }
  .pg-picker-row { display: flex; align-items: center; gap: 8px; padding: 8px; border-radius: 7px; font-size: 13px; cursor: pointer; }
  .pg-picker-row:hover { background: #F3F9EE; }
  .pg-picker-name { flex: 1; }

  .pg-contact-lines-list { display: flex; flex-direction: column; gap: 12px; margin-top: 12px; margin-bottom: 4px; }
  .pg-contact-line-card { border: 1px solid #E7EFE0; border-radius: 12px; padding: 14px; background: #FAFCF7; }
  .pg-contact-line-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 10px; }
  .pg-contact-line-name { display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 700; color: #1C2418; }
  .pg-contact-line-top-right { display: flex; align-items: center; gap: 8px; }
  .pg-select-sm { border: 1px solid #DCE8D0; border-radius: 8px; padding: 6px 8px; font-size: 12px; font-weight: 600; background: #fff; }

  .pg-contact-line-dates { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 12px; }

  .pg-split-block { background: #fff; border: 1px solid #E2EFD8; border-radius: 10px; padding: 12px; margin-bottom: 12px; }
  .pg-split-header-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 12px; align-items: end; }
  .pg-commission-total-display { display: flex; flex-direction: column; gap: 5px; }
  .pg-commission-total-value { font-size: 15px; font-weight: 700; color: #2E5C16; }

  .pg-split-parts { display: flex; gap: 8px; flex-wrap: wrap; }
  .pg-split-pill {
    flex: 1; min-width: 100px; background: #FAFCF7; border: 1px solid #E2EFD8;
    border-radius: 9px; padding: 8px; display: flex; flex-direction: column; gap: 4px; position: relative;
  }
  .pg-split-pill-me { background: #EAF5E2; border-color: #5BBA2E; }
  .pg-split-label-input { border: none; background: transparent; font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.02em; color: #6B8A57; padding: 0; width: 100%; }
  .pg-split-label-input:focus { outline: none; }
  .pg-split-pct-row { display: flex; align-items: baseline; gap: 2px; }
  .pg-split-pct-input { border: none; background: transparent; font-size: 16px; font-weight: 700; color: #1C2418; width: 44px; padding: 0; }
  .pg-split-pct-input:focus { outline: none; }
  .pg-split-amount { font-size: 12px; font-weight: 600; color: #2E5C16; }
  .pg-split-remove { position: absolute; top: 4px; right: 4px; background: none; border: none; color: #B9C7AC; cursor: pointer; padding: 2px; }
  .pg-split-remove:hover { color: #A33; }
  .pg-split-add {
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
    min-width: 70px; border: 1px dashed #C7DBB8; border-radius: 9px; background: none; color: #6B8A57; font-size: 11px; cursor: pointer;
  }
  .pg-split-add:hover { background: #F3F9EE; }
  .pg-split-warning { font-size: 11px; color: #97700C; margin-top: 8px; }

  .pg-doc-input-row { display: flex; align-items: center; gap: 8px; }

  .pg-contact-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; padding-bottom: 4px; }
  .pg-contact-card { border: 1px solid #E7EFE0; border-radius: 12px; padding: 14px; background: #fff; display: flex; flex-direction: column; gap: 10px; }
  .pg-contact-card-top { display: flex; align-items: center; gap: 8px; }
  .pg-contact-name-input { flex: 1; border: none; background: transparent; font-size: 15px; font-weight: 700; color: #1C2418; padding: 2px; }
  .pg-contact-name-input:focus { outline: none; border-bottom: 1px solid #5BBA2E; }
  .pg-contact-card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  button { font-family: inherit; }
  svg.icon { display: inline-block; vertical-align: middle; }

  @media (max-width: 700px) {
    .pg-shell { border-radius: 0; }
    .pg-detail-meta-grid { grid-template-columns: 1fr; }
    .pg-contact-line-dates { grid-template-columns: 1fr 1fr; }
    .pg-split-header-row { grid-template-columns: 1fr; }
    .pg-contact-card-grid { grid-template-columns: 1fr; }
    .pg-title { font-size: 20px; }
    .pg-logo { height: 32px; }
  }
</style>
</head>

const STATUTS = [
  { value: "en_attente", label: "En attente", color: "#97700C", bg: "#FBF3DC" },
  { value: "relance", label: "Relancé", color: "#1565C0", bg: "#E3EDFB" },
  { value: "accepte", label: "Accepté", color: "#2E7D32", bg: "#E3F2E5" },
  { value: "refuse", label: "Refusé", color: "#A33", bg: "#FBE6E6" },
  { value: "vendu", label: "Vendu", color: "#1C2418", bg: "#E7EFE0" },
  { value: "archive", label: "Archivé / Perdu", color: "#8A9A7E", bg: "#EFEFEF" },
];
const PAYS = ["France", "Portugal", "Espagne", "Italie", "Autre"];
const TYPES_BIEN = ["Marchand de biens", "Hôtel / Exploitation", "Division", "Résidentiel", "Terrain", "Autre"];

function statutMeta(v) { return STATUTS.find((s) => s.value === v) || STATUTS[0]; }
function fmtMoney(v) {
  const n = Number(v);
  if (!v || Number.isNaN(n)) return "—";
  return n.toLocaleString("fr-FR") + " €";
}
function fmtM2(v) {
  const n = Number(v);
  if (!v || Number.isNaN(n)) return "—";
  return Math.round(n).toLocaleString("fr-FR") + " €/m²";
}
function fmtDateShort(v) {
  if (!v) return "—";
  try {
    const d = new Date(v);
    return d.toLocaleDateString("fr-FR", { day: "2-digit", month: "2-digit" });
  } catch { return v; }
}
function computePricePerM2(price, surface) {
  const p = Number(price); const s = Number(surface);
  if (!p || !s) return "";
  return Math.round(p / s);
}

// ---------- Supabase data layer ----------
async function loadData() {
  const { data, error } = await supabase.from("pipeline_data").select("data").eq("id", "main").single();
  if (error) { console.error("Erreur chargement:", error); return null; }
  return data ? data.data : null;
}
async function saveData(data) {
  const { error } = await supabase.from("pipeline_data").update({ data, updated_at: new Date().toISOString() }).eq("id", "main");
  if (error) { console.error("Erreur sauvegarde:", error); return false; }
  return true;
}
function defaultData() { return { biens: [], investisseurs: [], vendeurs: [] }; }

// ---------- Atoms ----------
function Field({ label, children, hint }) {
  return (
    <label className="pg-field">
      <span className="pg-field-label">{label}</span>
      {children}
      {hint && <span className="pg-field-hint">{hint}</span>}
    </label>
  );
}
function Badge({ statut }) {
  const m = statutMeta(statut);
  return <span className="pg-badge" style={{ color: m.color, background: m.bg }}>{m.label}</span>;
}
function IconBtn({ onClick, title, children, danger }) {
  return (
    <button className={"pg-iconbtn" + (danger ? " danger" : "")} onClick={onClick} title={title} type="button">
      {children}
    </button>
  );
}

// ---------- Commission split block ----------
function SplitBlock({ contactLine, onChange }) {
  const price = Number(contactLine.prixPropose) || 0;
  const commissionPct = Number(contactLine.commissionPct) || 0;
  const commissionTotal = (price * commissionPct) / 100;
  const parts = contactLine.splitParts && contactLine.splitParts.length > 0
    ? contactLine.splitParts
    : [{ label: "Vendeur", pct: 40 }, { label: "Toi", pct: 20 }, { label: "Apporteur", pct: 40 }];

  const updatePart = (idx, patch) => onChange({ splitParts: parts.map((p, i) => i === idx ? { ...p, ...patch } : p) });
  const addPart = () => onChange({ splitParts: [...parts, { label: "Partie", pct: 0 }] });
  const removePart = (idx) => onChange({ splitParts: parts.filter((_, i) => i !== idx) });
  const totalPct = parts.reduce((s, p) => s + (Number(p.pct) || 0), 0);

  return (
    <div className="pg-split-block">
      <div className="pg-split-header-row">
        <Field label="Prix proposé (€)">
          <input type="number" className="pg-input pg-input-sm" value={contactLine.prixPropose} onChange={(e) => onChange({ prixPropose: e.target.value })} placeholder="0" />
        </Field>
        <Field label="Commission totale (%)">
          <input type="number" step="0.1" className="pg-input pg-input-sm" value={contactLine.commissionPct} onChange={(e) => onChange({ commissionPct: e.target.value })} placeholder="ex: 5" />
        </Field>
        <div className="pg-commission-total-display">
          <span className="pg-field-label">Commission totale</span>
          <span className="pg-commission-total-value">{fmtMoney(commissionTotal)}</span>
        </div>
      </div>
      <div className="pg-split-parts">
        {parts.map((p, idx) => {
          const partAmount = (commissionTotal * (Number(p.pct) || 0)) / 100;
          const isMe = p.label.toLowerCase().includes("toi") || p.label.toLowerCase().includes("moi");
          return (
            <div key={idx} className={"pg-split-pill" + (isMe ? " pg-split-pill-me" : "")}>
              <input className="pg-split-label-input" value={p.label} onChange={(e) => updatePart(idx, { label: e.target.value })} />
              <div className="pg-split-pct-row">
                <input type="number" className="pg-split-pct-input" value={p.pct} onChange={(e) => updatePart(idx, { pct: e.target.value })} />
                <span>%</span>
              </div>
              <div className="pg-split-amount">{fmtMoney(partAmount)}</div>
              <button className="pg-split-remove" onClick={() => removePart(idx)} type="button"><IconX size={11} /></button>
            </div>
          );
        })}
        <button className="pg-split-add" onClick={addPart} type="button"><IconPlus size={12} /> Partie</button>
      </div>
      {totalPct !== 100 && <div className="pg-split-warning">Total réparti : {totalPct}% (devrait faire 100%)</div>}
    </div>
  );
}

function ContactLineDetail({ line, contact, onUpdate, onRemove }) {
  return (
    <div className="pg-contact-line-card">
      <div className="pg-contact-line-top">
        <div className="pg-contact-line-name"><IconUser size={14} />{contact ? contact.nom : "(contact supprimé)"}</div>
        <div className="pg-contact-line-top-right">
          <select className="pg-select-sm" value={line.statut} onChange={(e) => onUpdate({ statut: e.target.value })} style={{ color: statutMeta(line.statut).color }}>
            {STATUTS.map((s) => <option key={s.value} value={s.value}>{s.label}</option>)}
          </select>
          <IconBtn title="Retirer ce contact" danger onClick={onRemove}><IconTrash size={13} /></IconBtn>
        </div>
      </div>
      <div className="pg-contact-line-dates">
        <Field label="Date transmission"><input type="date" className="pg-input pg-input-sm" value={line.dateTransmission} onChange={(e) => onUpdate({ dateTransmission: e.target.value })} /></Field>
        <Field label="Date retour"><input type="date" className="pg-input pg-input-sm" value={line.dateRetour} onChange={(e) => onUpdate({ dateRetour: e.target.value })} /></Field>
        <Field label="Date offre"><input type="date" className="pg-input pg-input-sm" value={line.dateOffre} onChange={(e) => onUpdate({ dateOffre: e.target.value })} /></Field>
        <Field label="Date relance"><input type="date" className="pg-input pg-input-sm" value={line.dateRelance} onChange={(e) => onUpdate({ dateRelance: e.target.value })} /></Field>
      </div>
      <SplitBlock contactLine={line} onChange={onUpdate} />
      <Field label="Observation">
        <input type="text" className="pg-input" value={line.observation} onChange={(e) => onUpdate({ observation: e.target.value })} placeholder="Raison du refus, contexte, etc." />
      </Field>
    </div>
  );
}

function ContactPicker({ allContacts, selectedIds, onChange, kindLabel }) {
  const [open, setOpen] = useState(false);
  const toggle = (id) => onChange(selectedIds.includes(id) ? selectedIds.filter((x) => x !== id) : [...selectedIds, id]);
  return (
    <div className="pg-contact-picker">
      <button type="button" className="pg-picker-trigger" onClick={() => setOpen((o) => !o)}>
        <span>{selectedIds.length === 0 ? `Lier un ${kindLabel}…` : `${selectedIds.length} lié${selectedIds.length > 1 ? "s" : ""}`}</span>
        <IconChevronRight size={13} style={{ transform: open ? "rotate(90deg)" : "none" }} />
      </button>
      {open && (
        <div className="pg-picker-dropdown">
          {allContacts.length === 0 && <div className="pg-picker-empty">Aucun contact en base.</div>}
          {allContacts.map((c) => (
            <label key={c.id} className="pg-picker-row">
              <input type="checkbox" checked={selectedIds.includes(c.id)} onChange={() => toggle(c.id)} />
              <span className="pg-picker-name">{c.nom || "(sans nom)"}</span>
            </label>
          ))}
        </div>
      )}
    </div>
  );
}

function BienDetail({ bien, allInvestisseurs, allVendeurs, onUpdate, onBack }) {
  const investisseurIds = bien.investisseurs.map((c) => c.contactId);
  const vendeurIds = bien.vendeurs.map((c) => c.contactId);

  const makeLine = (id) => ({
    contactId: id, dateTransmission: "", dateRetour: "", dateOffre: "", dateRelance: "",
    prixPropose: "", commissionPct: "",
    splitParts: [{ label: "Vendeur", pct: 40 }, { label: "Toi", pct: 20 }, { label: "Apporteur", pct: 40 }],
    statut: "en_attente", observation: "",
  });

  const setInvestisseurs = (ids) => onUpdate({ ...bien, investisseurs: ids.map((id) => bien.investisseurs.find((c) => c.contactId === id) || makeLine(id)) });
  const setVendeurs = (ids) => onUpdate({ ...bien, vendeurs: ids.map((id) => bien.vendeurs.find((c) => c.contactId === id) || makeLine(id)) });
  const updateLine = (group, contactId, patch) => onUpdate({ ...bien, [group]: bien[group].map((c) => c.contactId === contactId ? { ...c, ...patch } : c) });
  const removeLine = (group, contactId) => onUpdate({ ...bien, [group]: bien[group].filter((c) => c.contactId !== contactId) });

  const prixM2Demande = computePricePerM2(bien.prixDemande, bien.surface);

  return (
    <div className="pg-detail-screen">
      <button className="pg-back-btn" onClick={onBack} type="button"><IconChevronLeft size={15} /> Retour aux biens</button>
      <input className="pg-detail-title-input" value={bien.nom} placeholder="Nom / adresse du bien" onChange={(e) => onUpdate({ ...bien, nom: e.target.value })} />
      <div className="pg-detail-created-hint">Créé le {fmtDateShort(bien.dateCreation)}</div>

      <div className="pg-detail-meta-grid">
        <Field label="Ville"><input className="pg-input" value={bien.ville} onChange={(e) => onUpdate({ ...bien, ville: e.target.value })} /></Field>
        <Field label="Pays">
          <select className="pg-input" value={bien.pays} onChange={(e) => onUpdate({ ...bien, pays: e.target.value })}>
            {PAYS.map((p) => <option key={p} value={p}>{p}</option>)}
          </select>
        </Field>
        <Field label="Type">
          <select className="pg-input" value={bien.type} onChange={(e) => onUpdate({ ...bien, type: e.target.value })}>
            {TYPES_BIEN.map((t) => <option key={t} value={t}>{t}</option>)}
          </select>
        </Field>
        <Field label="Surface (m²)"><input type="number" className="pg-input" value={bien.surface} onChange={(e) => onUpdate({ ...bien, surface: e.target.value })} /></Field>
        <Field label="Prix demandé (€)"><input type="number" className="pg-input" value={bien.prixDemande} onChange={(e) => onUpdate({ ...bien, prixDemande: e.target.value })} /></Field>
        <Field label="€/m² demandé" hint="calculé automatiquement"><div className="pg-readonly-value">{prixM2Demande ? fmtM2(prixM2Demande) : "—"}</div></Field>
        <Field label="Date réception"><input type="date" className="pg-input" value={bien.dateReception} onChange={(e) => onUpdate({ ...bien, dateReception: e.target.value })} /></Field>
        <Field label="Statut global">
          <select className="pg-input" value={bien.statutGlobal} onChange={(e) => onUpdate({ ...bien, statutGlobal: e.target.value })} style={{ color: statutMeta(bien.statutGlobal).color, fontWeight: 700 }}>
            {STATUTS.map((s) => <option key={s.value} value={s.value}>{s.label}</option>)}
          </select>
        </Field>
      </div>

      <Field label="Observation générale">
        <input className="pg-input" value={bien.observation} onChange={(e) => onUpdate({ ...bien, observation: e.target.value })} placeholder="Note libre sur ce bien" />
      </Field>

      <div className="pg-detail-section-title">Broker-Vendeur lié</div>
      <Field label="Lier un broker-vendeur">
        <ContactPicker allContacts={allVendeurs} selectedIds={vendeurIds} onChange={setVendeurs} kindLabel="broker-vendeur" />
      </Field>
      {bien.vendeurs.length === 0 && <div className="pg-empty-hint">Aucun broker-vendeur lié.</div>}
      <div className="pg-contact-lines-list">
        {bien.vendeurs.map((c) => {
          const contact = allVendeurs.find((x) => x.id === c.contactId);
          return <ContactLineDetail key={c.contactId} line={c} contact={contact} onUpdate={(patch) => updateLine("vendeurs", c.contactId, patch)} onRemove={() => removeLine("vendeurs", c.contactId)} />;
        })}
      </div>

      <div className="pg-detail-section-title">Broker-Investisseur(s) lié(s)</div>
      <Field label="Lier un broker-investisseur">
        <ContactPicker allContacts={allInvestisseurs} selectedIds={investisseurIds} onChange={setInvestisseurs} kindLabel="broker-investisseur" />
      </Field>
      {bien.investisseurs.length === 0 && <div className="pg-empty-hint">Aucun broker-investisseur lié. Tu peux en lier plusieurs.</div>}
      <div className="pg-contact-lines-list">
        {bien.investisseurs.map((c) => {
          const contact = allInvestisseurs.find((x) => x.id === c.contactId);
          return <ContactLineDetail key={c.contactId} line={c} contact={contact} onUpdate={(patch) => updateLine("investisseurs", c.contactId, patch)} onRemove={() => removeLine("investisseurs", c.contactId)} />;
        })}
      </div>
    </div>
  );
}

function BienRowCompact({ bien, onOpen, onDelete }) {
  return (
    <div className="pg-biens-row" onClick={onOpen}>
      <div className="pg-biens-row-name">{bien.nom || "Sans nom"}</div>
      <div className="pg-biens-row-right">
        <span className="pg-biens-row-price">{fmtMoney(bien.prixDemande)}</span>
        <Badge statut={bien.statutGlobal} />
        <IconBtn title="Supprimer" danger onClick={(e) => { e.stopPropagation(); onDelete(bien.id); }}><IconTrash size={14} /></IconBtn>
        <IconChevronRight size={16} className="pg-chevron" />
      </div>
    </div>
  );
}

function ContactCard({ contact, onUpdate, onDelete, kind }) {
  return (
    <div className="pg-contact-card">
      <div className="pg-contact-card-top">
        <input className="pg-contact-name-input" value={contact.nom} placeholder={kind === "investisseur" ? "Nom du broker-investisseur" : "Nom du broker-vendeur"} onChange={(e) => onUpdate({ ...contact, nom: e.target.value })} />
        <IconBtn title="Supprimer" danger onClick={() => onDelete(contact.id)}><IconTrash size={15} /></IconBtn>
      </div>
      <div className="pg-contact-card-grid">
        <Field label="Société"><input className="pg-input" value={contact.societe} onChange={(e) => onUpdate({ ...contact, societe: e.target.value })} /></Field>
        <Field label="Téléphone"><input className="pg-input" value={contact.telephone} onChange={(e) => onUpdate({ ...contact, telephone: e.target.value })} /></Field>
        <Field label="Email"><input className="pg-input" value={contact.email} onChange={(e) => onUpdate({ ...contact, email: e.target.value })} /></Field>
        {kind === "investisseur" ? (
          <Field label="Ticket d'investissement"><input className="pg-input" value={contact.ticket} onChange={(e) => onUpdate({ ...contact, ticket: e.target.value })} placeholder="ex: 200 000 - 500 000 €" /></Field>
        ) : (
          <Field label="Biens représentés"><input className="pg-input" value={contact.biensRepresentes} onChange={(e) => onUpdate({ ...contact, biensRepresentes: e.target.value })} /></Field>
        )}
      </div>
      <Field label="Document lié (NDA, accord-cadre…)" hint="nom du fichier ou lien — pas d'upload">
        <div className="pg-doc-input-row">
          <IconLink size={13} style={{color:"#6B8A57", flexShrink:0}} />
          <input className="pg-input" value={contact.document || ""} onChange={(e) => onUpdate({ ...contact, document: e.target.value })} placeholder="ex: NDA_GARCIA_FELLICIMMO_v4.pdf ou lien Drive" />
        </div>
      </Field>
      <Field label="Notes">
        <textarea className="pg-textarea" value={contact.notes} onChange={(e) => onUpdate({ ...contact, notes: e.target.value })} rows={2} />
      </Field>
    </div>
  );
}

function App() {
  const [data, setData] = useState(null);
  const [tab, setTab] = useState("biens");
  const [openBienId, setOpenBienId] = useState(null);
  const [loading, setLoading] = useState(true);
  const [saveState, setSaveState] = useState("idle");

  useEffect(() => {
    let mounted = true;
    (async () => {
      const loaded = await loadData();
      if (mounted) { setData(loaded || defaultData()); setLoading(false); }
    })();
    return () => { mounted = false; };
  }, []);

  useEffect(() => {
    if (!data) return;
    const interval = setInterval(async () => {
      const fresh = await loadData();
      if (fresh) {
        setData((prev) => JSON.stringify(prev) !== JSON.stringify(fresh) ? fresh : prev);
      }
    }, 4000);
    return () => clearInterval(interval);
  }, [data]);

  const persist = useCallback(async (next) => {
    setData(next);
    setSaveState("saving");
    const ok = await saveData(next);
    setSaveState(ok ? "saved" : "error");
    setTimeout(() => setSaveState("idle"), 1200);
  }, []);

  if (loading || !data) {
    return <div style={{textAlign:"center", padding:"60px 0", color:"#4C7A2E"}}>Chargement du pipeline…</div>;
  }

  const addBien = () => {
    const nb = {
      id: uid(), nom: "", ville: "", pays: PAYS[0], type: TYPES_BIEN[0], surface: "", prixDemande: "",
      dateCreation: todayISO(), dateReception: todayISO(), statutGlobal: "en_attente", observation: "",
      investisseurs: [], vendeurs: [],
    };
    persist({ ...data, biens: [nb, ...data.biens] });
    setOpenBienId(nb.id);
  };
  const updateBien = (b) => persist({ ...data, biens: data.biens.map((x) => x.id === b.id ? b : x) });
  const deleteBien = (id) => {
    persist({ ...data, biens: data.biens.filter((x) => x.id !== id) });
    if (openBienId === id) setOpenBienId(null);
  };
  const addContact = (kind) => {
    const base = { id: uid(), nom: "", societe: "", telephone: "", email: "", notes: "", document: "" };
    if (kind === "investisseur") persist({ ...data, investisseurs: [{ ...base, ticket: "" }, ...data.investisseurs] });
    else persist({ ...data, vendeurs: [{ ...base, biensRepresentes: "" }, ...data.vendeurs] });
  };
  const updateContact = (kind, c) => {
    if (kind === "investisseur") persist({ ...data, investisseurs: data.investisseurs.map((x) => x.id === c.id ? c : x) });
    else persist({ ...data, vendeurs: data.vendeurs.map((x) => x.id === c.id ? c : x) });
  };
  const deleteContact = (kind, id) => {
    if (kind === "investisseur") persist({ ...data, investisseurs: data.investisseurs.filter((x) => x.id !== id) });
    else persist({ ...data, vendeurs: data.vendeurs.filter((x) => x.id !== id) });
  };

  const openBien = data.biens.find((b) => b.id === openBienId);

  return (
    <div className="pg-shell">
      <header className="pg-header">
        <div className="pg-logo-cartouche"><img src={`data:image/png;base64,${LOGO_B64}`} alt="PG Immobilier" className="pg-logo" /></div>
        <div className="pg-header-actions">
          <span className={"pg-save-indicator " + saveState}>
            {saveState === "saving" && "Enregistrement…"}
            {saveState === "saved" && "✓ Enregistré"}
            {saveState === "error" && "Erreur de sauvegarde"}
          </span>
          {!openBien && tab === "biens" && <button className="pg-btn-primary" onClick={addBien}><IconPlus size={16} /> Nouveau bien</button>}
          {!openBien && tab === "vendeurs" && <button className="pg-btn-primary" onClick={() => addContact("vendeur")}><IconPlus size={16} /> Nouveau contact</button>}
          {!openBien && tab === "investisseurs" && <button className="pg-btn-primary" onClick={() => addContact("investisseur")}><IconPlus size={16} /> Nouveau contact</button>}
        </div>
      </header>

      {!openBien && (
        <React.Fragment>
          <nav className="pg-tabs">
            <button className={"pg-tab" + (tab === "biens" ? " active" : "")} onClick={() => setTab("biens")}><IconBuilding size={14} /> Biens</button>
            <button className={"pg-tab" + (tab === "vendeurs" ? " active" : "")} onClick={() => setTab("vendeurs")}>Broker-Vendeur</button>
            <button className={"pg-tab" + (tab === "investisseurs" ? " active" : "")} onClick={() => setTab("investisseurs")}>Broker-Investisseur</button>
          </nav>
          <h1 className="pg-title">
            {tab === "biens" && "Pipeline PG Immobilier"}
            {tab === "vendeurs" && "Broker-Vendeur"}
            {tab === "investisseurs" && "Broker-Investisseur"}
          </h1>
        </React.Fragment>
      )}

      <section className="pg-panel">
        {openBien ? (
          <BienDetail bien={openBien} allInvestisseurs={data.investisseurs} allVendeurs={data.vendeurs} onUpdate={updateBien} onBack={() => setOpenBienId(null)} />
        ) : (
          <React.Fragment>
            {tab === "biens" && (
              <React.Fragment>
                {data.biens.length === 0 && <div className="pg-empty-state">Aucun bien suivi. Ajoute ton premier bien pour démarrer le pipeline.</div>}
                <div className="pg-biens-list">
                  {data.biens.map((b) => <BienRowCompact key={b.id} bien={b} onOpen={() => setOpenBienId(b.id)} onDelete={deleteBien} />)}
                </div>
              </React.Fragment>
            )}
            {tab === "vendeurs" && (
              <React.Fragment>
                {data.vendeurs.length === 0 && <div className="pg-empty-state">Aucun contact en base.</div>}
                <div className="pg-contact-grid">
                  {data.vendeurs.map((c) => <ContactCard key={c.id} contact={c} kind="vendeur" onUpdate={(nc) => updateContact("vendeur", nc)} onDelete={(id) => deleteContact("vendeur", id)} />)}
                </div>
              </React.Fragment>
            )}
            {tab === "investisseurs" && (
              <React.Fragment>
                {data.investisseurs.length === 0 && <div className="pg-empty-state">Aucun contact en base.</div>}
                <div className="pg-contact-grid">
                  {data.investisseurs.map((c) => <ContactCard key={c.id} contact={c} kind="investisseur" onUpdate={(nc) => updateContact("investisseur", nc)} onDelete={(id) => deleteContact("investisseur", id)} />)}
                </div>
              </React.Fragment>
            )}
          </React.Fragment>
        )}
      </section>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
